################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=DP-1, 2880x864@120, 0x1200, 1.5
monitor=eDP-1,1920x1200@120, 0x0, 1
source = ~/.config/hypr/monitorconf.lua
device {
    name = elan9008:00-04f3:2f29
    output = eDP-1
}
device {
    name = elan9009:00-04f3:2f2a
    output = DP-1
}
device {
    name = elan9008:00-04f3:2f29-stylus
    output = eDP-1
}
device {
    name = elan9009:00-04f3:2f2a-stylus
    output = DP-1
}

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show run


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &

exec = gsettings set org.gnome.desktop.interface gtk-theme "Breeze-Dark"   # for GTK3 apps
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps

exec-once = waybar -c /home/au512/.config/waybar/CnM/config -s /home/au512/.config/waybar/CnM/style.css  & kdeconnectd
exec-once = hyprctl dispatch special:magic
exec-once = [workspace magic silent] flatpak run com.spotify.Client
exec-once = dunst
exec-once = hyprsunset
exec-once = hypridle
exec-once = hyprpaper
exec-once = /home/au512/Scripts/media-player-inhibit-sleep.py
exec-once = systemctl --user start hyprpolkitagent
#exec-once = hyprpm reload -n
# exec-once = hyprlock

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

