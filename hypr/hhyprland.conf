#####################
### LOOK AND FEEL ###
#####################



# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(996912ee) rgba(debb12ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    #layout = dwindle
    layout = scrolling
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = false
        size = 8
        passes = 2
        vibrancy = 0.2
    }
}

layerrule = blur on, match:namespace rofi
# layerrule = blur,^(waybar.*)$


# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
 workspace = w[tv1], gapsout:0, gapsin:0
 workspace = f[1], gapsout:0, gapsin:0
 windowrule = border_size 0, float 0, workspace w[tv1]
 windowrule = rounding 0, float 0, workspace w[tv1]
 windowrule = border_size 0, float 0, workspace f[1]
 windowrule = rounding 0, float 0, workspace f[1]
 windowrule = match:class Spotify, workspace magic

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {# Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = false # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    #vfr=true
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace
gesture = 3, pinchin, fullscreen
gesture = 3, pinchout, close
gesture = 3, down, move
gesture = 3, up, special, magic
gesture = 4, swipe, move

plugin {
    touch_gestures {
        sensitivity=4

        # swipe left from right edge
        hyprgrass-bind = , edge:r:l, workspace, +1

        # swipe up from bottom edge
        #hyprgrass-bind = , edge:d:u, exec, flatpak run app.zen_browser.zen


        workspace_swipe = false
        workspace_swipe_cancel_ratio = 0.01

        # swipe down from left edge
        hyprgrass-bind = , edge:d:r, exec, pactl set-sink-volume @DEFAULT_SINK@ -4%

        # swipe down with 4 fingers
        hyprgrass-bind = , tap:4, togglespecialworkspace, magic

        # swipe diagonally left and down with 3 fingers
        # l (or r) must come before d and u
        #hyprgrass-bind = , swipe:3:ld, exec, foot

        # tap with 3 fingers
        hyprgrass-bind = , tap:3, exec, waybar -c /home/au512/.config/waybar/StatusBar/config -s /home/au512/.config/waybar/StatusBar/style.css -l off
        hyprgrass-bind = , tap:3, exec, pkill rofi || rofi -show drun -show-icons && kill $(pgrep -f "waybar -c /home/au512/.config/waybar/StatusBar/config -s /home/au512/.config/waybar/StatusBar/style.css")

        # pinch in with 3 fingers
        #hyprgrass-bind = , pinch:3:o, killactive

        # longpress can trigger mouse binds:
        #hyprgrass-bindm = , longpress:3, movewindow
        #hyprgrass-bindm = , longpress:4, resizewindow

        hyprgrass-gesture = swipe,3,swipe,move
        hyprgrass-gesture = swipe,4,down,close
        hyprgrass-gesture = swipe,4,up,fullscreen
    }
}

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bindl=,switch:on:Lid Switch, exec, hyprlock & hyprctl dispatch dpms off && if [[ "$(playerctl -p spotify status)" != "Playing" && "$(pidof hypridle)" != "" ]]; then systemctl hibernate; fi
bindl=,switch:off:Lid Switch, exec, hyprctl dispatch dpms on & powerprofilesctl set $(cat ~/Scripts/powerprofile)
bindl=,switch:on:Lid Switch, exec, echo $(powerprofilesctl get) > ~/Scripts/powerprofile && powerprofilesctl set power-saver
bindl=,XF86poweroff,exec, systemctl sleep
# bindl=$mainMod, XF86poweroff, exec, systemctl poweroff

bind = $mainMod, T, exec, $terminal
bind = $mainMod, C, killactive,
bindl = $mainMod, XF86poweroff, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bindl = SHIFT, XF86poweroff, exec, systemctl poweroff
bindl = $mainMod SHIFT, XF86poweroff, exec, systemctl reboot
bindl = ctrl, XF86poweroff, exec, systemctl hibernate
bind = $mainMod, I, exec, systemsettings
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, period, exec, rofimoji
bind = $mainMod, period, exec, rofimoji --selector-args="-auto-select -theme ~/.config/rofimoji/config.rasi" --hidden-descriptions

bindr = SUPER, SUPER_L, exec,  waybar -c /home/au512/.config/waybar/StatusBar/config -s /home/au512/.config/waybar/StatusBar/style.css -l off
# bindr = SUPER, SUPER_L, exec, pkill wofi || wofi --show drun
bindr = SUPER, SUPER_L, exec, pkill rofi || rofi -show drun -show-icons && kill $(pgrep -f "waybar -c /home/au512/.config/waybar/StatusBar/config -s /home/au512/.config/waybar/StatusBar/style.css")
bindl = $mainMod SHIFT, I, exec, if [ "$(pidof hypridle)" == "" ]; then hypridle & notify-send -t 1000 "Hypridle" "Hypridle resumed."; else killall hypridle && notify-send -t 1000 "Hypridle" "Hypridle paused."; fi # hypridle toggle

bindr = $mainMod, P, exec, pkill waybar || waybar -c /home/au512/.config/waybar/CnM/config -s /home/au512/.config/waybar/CnM/style.css  & kdeconnectd

bindl = ,XF86Launch7, exec, if [[ $(brightnessctl -d asus::screenpad g) == 0 ]]; then brightnessctl -rd asus::screenpad; else brightnessctl -sd asus::screenpad s 0; fi
bindl = $mainMod,XF86Launch7, exec, if [[ $(brightnessctl -d asus::screenpad g) == 0 && $(brightnessctl -d intel_backlight g) == 0 ]]; then brightnessctl -rd asus::screenpad && brightnessctl -rd intel_backlight; else brightnessctl -sd asus::screenpad s 0 && brightnessctl -sd intel_backlight s 0; fi

bind = $mainMod, L, exec, hyprlock
bindl = , Print, exec, grimshot copy anything
bindl = $mainMod, Print, exec, grimshot savecopy anything
bindl = Ctrl, Print, exec, grimshot savecopy screen
bind = $mainMod, Z, exec, flatpak run app.zen_browser.zen
bind = $mainMod, R, exec, flatpak run com.github.flxzt.rnote

# Power Profiles Toggle
bindl = $mainMod, B, exec, if [[ $(powerprofilesctl get) == "power-saver" ]]; then powerprofilesctl set balanced && notify-send -t 1000 "Power Profile" "Balanced mode"; elif [[ $(powerprofilesctl get) == "balanced" ]]; then powerprofilesctl set performance && notify-send -t 1000 "Power Profile" "Performance mode"; elif [ $(powerprofilesctl get) == "performance" ]; then powerprofilesctl set power-saver && notify-send -t 1000 "Power Profile" "Power Saver mode"; fi

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, mouse_right, layoutmsg, move +col
bind = $mainMod, mouse_left, layoutmsg, move -col
bind = $mainMod, mouse_down, fullscreen, 0 unset
bind = $mainMod, mouse_up, fullscreen, 0 set
bind = $mainMod, X, fullscreen, 0 toggle

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = , XF86Launch6, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic
bind = $mainMod SHIFT, T, togglespecialworkspace, pomodoro

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod SHIFT, mouse_left, workspace, e+1
bind = $mainMod SHIFT, mouse_right, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse:275, killactive,

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = SHIFT,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+
bindel = SHIFT,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-
bindel = SHIFT,XF86MonBrightnessUp, exec, brightnessctl s 1+
bindel = SHIFT,XF86MonBrightnessDown, exec, brightnessctl s 1-
bindel = $mainMod,XF86MonBrightnessUp, exec, brightnessctl -d asus::screenpad s 5%+
bindel = $mainMod,XF86MonBrightnessDown, exec, brightnessctl -d asus::screenpad s 5%-
bindel = $mainMod SHIFT,XF86MonBrightnessUp, exec, brightnessctl -d asus::screenpad s 1+
bindel = $mainMod SHIFT,XF86MonBrightnessDown, exec, brightnessctl -d asus::screenpad s 1-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
bindl = $mainMod, XF86AudioMute, exec, playerctl play-pause
bindl = $mainMod, XF86AudioRaiseVolume, exec, playerctl next
bindl = $mainMod, XF86AudioLowerVolume, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
# windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = no_focus 1,match:class ^$,match:title ^$,float 1,fullscreen 0,pin 0

debug:disable_logs = false

# For Noctalia Color templates
source = ~/.config/hypr/noctalia.conf
